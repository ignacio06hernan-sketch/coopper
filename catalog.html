<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo - Coopper</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">COOPPER</a>
        <ul class="nav-links">
            <li><a href="index.html">Métricas</a></li>
            <li><a href="stock.html">Stock</a></li>
            <li><a href="catalog.html">Catálogo</a></li>
            <li><a href="calendar.html">Drops</a></li>
            <li><a href="history.html">Historial</a></li>
            <li><a href="profile.html">Ajustes</a></li>
        </ul>
    </nav>

    <main class="container">
        <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
            <select style="width: 200px;"><option>Armas</option></select>
            <select style="width: 200px;"><option>Rareza: Épico</option></select>
            <input type="text" placeholder="Buscar skin...">
        </div>
        <div class="grid-3">
            <div class="card">
                <img src="https://via.placeholder.com/300x180/000/00f2ff" style="width: 100%; border-radius: 8px;">
                <h3 style="margin: 10px 0;">Phantom Blade</h3>
                <span class="badge epic">Épico</span>
                <p style="color: var(--accent-cyan); margin-top: 10px;">$89.00</p>
                <a href="detail.html" class="btn" style="display: block; text-align: center; margin-top: 10px; text-decoration: none;">Ver Detalle</a>
            </div>
            <div class="card">
                <img src="https://via.placeholder.com/300x180/000/7000ff" style="width: 100%; border-radius: 8px;">
                <h3 style="margin: 10px 0;">Neon Gauntlets</h3>
                <span class="badge legendary">Legendario</span>
                <p style="color: var(--accent-cyan); margin-top: 10px;">$550.00</p>
                <a href="detail.html" class="btn" style="display: block; text-align: center; margin-top: 10px; text-decoration: none;">Ver Detalle</a>
            </div>
        </div>
    </main>
</body>
</html>
