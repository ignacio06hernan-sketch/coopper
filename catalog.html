<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo - Coopper</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">COOPPER</a>
        <ul class="nav-links">
            <li><a href="index.html">Métricas</a></li>
            <li><a href="stock.html">Stock</a></li>
            <li><a href="catalog.html">Catálogo</a></li>
            <li><a href="calendar.html">Drops</a></li>
            <li><a href="history.html">Historial</a></li>
            <li><a href="profile.html">Ajustes</a></li>
        </ul>
    </nav>

    <main class="container">
        <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
            <select style="width: 200px;"><option>Armas</option></select>
            <select style="width: 200px;"><option>Rareza: Épico</option></select>
            <input type="text" placeholder="Buscar skin...">
        </div>
        
        <div class="grid-3">
            <!-- Card 1: Rifle Cian -->
            <div class="card">
                <div style="height: 200px; overflow: hidden; border-radius: 8px;">
                    <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=500&auto=format&fit=crop" style="width: 100%; height: 100%; object-fit: cover;" alt="Neon Rifle">
                </div>
                <h3 style="margin: 10px 0;">Cyber-Pulse Rifle</h3>
                <span class="badge epic">Épico</span>
                <p style="color: var(--accent-cyan); margin-top: 10px; font-weight: bold;">1,200 CR</p>
                <a href="detail.html" class="btn" style="display: block; text-align: center; margin-top: 10px; text-decoration: none; font-size: 0.8rem;">Ver Detalles</a>
            </div>

            <!-- Card 2: Katana Violeta -->
            <div class="card">
                <div style="height: 200px; overflow: hidden; border-radius: 8px;">
                    <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=500&auto=format&fit=crop" style="width: 100%; height: 100%; object-fit: cover;" alt="Neon Blade">
                </div>
                <h3 style="margin: 10px 0;">Void Edge Katana</h3>
                <span class="badge legendary">Legendario</span>
                <p style="color: var(--accent-cyan); margin-top: 10px; font-weight: bold;">3,500 CR</p>
                <a href="detail.html" class="btn" style="display: block; text-align: center; margin-top: 10px; text-decoration: none; font-size: 0.8rem;">Ver Detalles</a>
            </div>

            <!-- Card 3: Casco Sci-Fi -->
            <div class="card">
                <div style="height: 200px; overflow: hidden; border-radius: 8px;">
                    <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=500&auto=format&fit=crop" style="width: 100%; height: 100%; object-fit: cover;" alt="Sci-fi Helmet">
                </div>
                <h3 style="margin: 10px 0;">Neural Interface V2</h3>
                <span class="badge rare">Raro</span>
                <p style="color: var(--accent-cyan); margin-top: 10px; font-weight: bold;">850 CR</p>
                <a href="detail.html" class="btn" style="display: block; text-align: center; margin-top: 10px; text-decoration: none; font-size: 0.8rem;">Ver Detalles</a>
            </div>
        </div>
    </main>
</body>
</html>
