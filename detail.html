<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Ítem - Coopper</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">COOPPER</a>
        <ul class="nav-links">
            <li><a href="index.html">Métricas</a></li>
            <li><a href="stock.html">Stock</a></li>
            <li><a href="catalog.html">Catálogo</a></li>
            <li><a href="calendar.html">Drops</a></li>
            <li><a href="history.html">Historial</a></li>
            <li><a href="profile.html">Ajustes</a></li>
        </ul>
    </nav>

    <main class="container" id="item-content" style="display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; margin-top: 4rem; align-items: center;">
        <!-- Contenido Dinámico -->
        <div style="position: relative;">
            <img id="item-img" src="" style="width: 100%; border-radius: 20px; border: 1px solid var(--accent-purple); box-shadow: 0 0 30px rgba(112, 0, 255, 0.3);">
        </div>

        <div>
            <span id="item-badge" class="badge">Rareza</span>
            <h1 id="item-name" style="font-size: 3.5rem; margin: 1rem 0; color: var(--accent-cyan);">Nombre del Ítem</h1>
            <p id="item-desc" style="color: var(--text-dim); font-size: 1.1rem; margin-bottom: 2rem;">Descripción del ítem...</p>
            
            <div class="card" style="margin-bottom: 2rem;">
                <h2 id="item-price" style="font-size: 2.5rem;">0 CR</h2>
            </div>

            <div style="display: flex; gap: 1rem;">
                <button class="btn" style="flex: 2;">Comprar Ahora</button>
                <button class="btn btn-outline" style="flex: 1;">Favorito</button>
            </div>
        </div>
    </main>

    <script>
        // BASE DE DATOS DE LOS OBJETOS
        const items = {
            "1": {
                name: "Cyber-Pulse Rifle",
                badge: "Épico",
                badgeClass: "epic",
                desc: "Rifle de asalto automático con balas de energía cian. Ideal para combates a media distancia en entornos urbanos.",
                price: "1,200 CR",
                img: "pulserife.png"
            },
            "2": {
                name: "Void Edge Katana",
                badge: "Legendario",
                badgeClass: "legendary",
                desc: "Una hoja que corta el espacio-tiempo. Los enemigos no verán venir el golpe gracias a su recubrimiento de antimateria.",
                price: "3,500 CR",
                img: "katana.png"
            },
            "3": {
                name: "Neural Interface",
                badge: "Raro",
                badgeClass: "rare",
                desc: "Aumenta la velocidad de reacción del usuario en un 15%. Compatible con la mayoría de los sistemas operativos neurales.",
                price: "850 CR",
                img: "casco.png"
            }
        };

        // LÓGICA PARA LEER LA URL
        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('id');

        if (items[itemId]) {
            const data = items[itemId];
            document.getElementById('item-name').innerText = data.name;
            document.getElementById('item-desc').innerText = data.desc;
            document.getElementById('item-price').innerText = data.price;
            document.getElementById('item-img').src = data.img;
            document.getElementById('item-badge').innerText = data.badge;
            document.getElementById('item-badge').className = 'badge ' + data.badgeClass;
            document.title = data.name + " - Coopper";
        } else {
            document.getElementById('item-content').innerHTML = "<h1>Ítem no encontrado</h1><a href='catalog.html' class='btn'>Volver al catálogo</a>";
        }
    </script>
</body>
</html>
