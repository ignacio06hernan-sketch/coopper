<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Ítem - Coopper</title>
    <link rel="stylesheet" href="styles.css">
</head>
<main class="container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; min-height: 80vh;">
    <div class="card" style="padding: 0;">
        <img src="https://via.placeholder.com/500x500/161616/00f2ff?text=Neon+Blade" alt="Item" style="width: 100%; border-radius: 12px;">
    </div>
    <div>
        <span class="badge legendary">Legendario</span>
        <h1 style="font-size: 3.5rem;">Neon Blade X</h1>
        <p style="color: var(--text-dim); margin-bottom: 2rem;">Forjada en las profundidades de Neo-Tokyo, esta hoja emite una frecuencia vibratoria capaz de cortar el acero carbono.</p>
        <div class="card" style="margin-bottom: 2rem;">
            <h4>Atributos Técnicos</h4>
            <ul style="list-style: none; padding: 0;">
                <li>⚔️ Daño: 95</li>
                <li>⚡ Velocidad: +15%</li>
            </ul>
        </div>
        <button class="btn" style="width: 100%; margin-bottom: 1rem;">Comprar Ahora - 2,500 CR</button>
        <button class="btn btn-outline" style="width: 100%;">Añadir a Deseados</button>
    </div>
</main>
