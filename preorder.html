<main class="container" style="max-width: 800px;">
    <h1>Reserva de Ítems Exclusivos</h1>
    <div style="display: grid; grid-template-columns: 1fr 250px; gap: 2rem;">
        <form class="card">
            <label>Seleccionar Ítem</label>
            <select><option>M4A1-S Cyberflow (Limited Edition)</option></select>
            <label>Cantidad</label>

        <div class="card" style="border-color: var(--accent-purple);">

            <hr style="margin: 1rem 0; border: 0.5px solid #333;">

        </div>
