<main class="container">
    <div style="display: grid; grid-template-columns: 1fr 300px; gap: 2rem;">
        <div class="grid-7" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px;">
            <!-- Simulación de días -->
            <script>
                for(let i=1; i<=31; i++) {
                    document.write(`<div class="card" style="height: 100px; font-size: 0.8rem;">${i} ${i==15 ? '<br><span class="badge epic">DROP</span>' : ''}</div>`);
                }
            </script>
        </div>
        <div class="card">
            <h3>Evento Seleccionado</h3>
            <p class="badge epic">Lanzamiento Skin Dragón</p>
            <p style="margin-top: 1rem;">Este 15 de Mayo se liberarán 50 unidades de la skin 'Elder Dragon' para el rifle de francotirador.</p>
        </div>
    </div>
</main>
